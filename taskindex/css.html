    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #0d6efd;
            margin-bottom: 40px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background-color: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 0px 10px lightgray;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .card h3 {
            color: #0d6efd;
            margin-bottom: 15px;
        }

        .card a {
            display: block;
            text-decoration: none;
            background-color: #0d6efd;
            color: white;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .card a:hover {
            background-color: #084298;
        }

        @media(max-width:768px) {
            body {
                padding: 20px;
            }
        }
    </style>

</head>
