<script>

    function availableSeats(bookedSeats){

    let seats = [];

    for(let i = 1; i <= 10; i++){

        if(!bookedSeats.includes(i)){
            seats.push(i);
        }

    }

    return seats;

}

console.log(availableSeats([1,3,5,7]));
console.log(availableSeats([2,4,6,8,10]));
console.log(availableSeats([1,2,3,4,5,6,7,8]));


</script>
