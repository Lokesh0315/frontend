<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImgGallery Hover</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
    
    <body class="bg-gray-100 p-5">

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">

    <div class="overflow-hidden rounded-lg">
      <img src="../../CSS/assests/Images/Transportation/1.jpeg" 
           class="transition hover:scale-110">
    </div>

    <div class="overflow-hidden rounded-lg">
      <img src="../../CSS/assests/Images/Transportation/2.jpeg" 
           class="transition hover:scale-110">
    </div>

    <div class="overflow-hidden rounded-lg">
      <img src="../../CSS/assests/Images/Transportation/3.jpeg" 
           class="transition hover:scale-110">
    </div>

    <div class="overflow-hidden rounded-lg">
      <img src="../../CSS/assests/Images/Transportation/4.jpeg" 
           class="transition hover:scale-110">
    </div>

    <div class="overflow-hidden rounded-lg">
      <img src="../../CSS/assests/Images/Transportation/5.jpeg" 
           class="transition hover:scale-110">
    </div>

    <div class="overflow-hidden rounded-lg">
      <img src="../../CSS/assests/Images/Transportation/1.jpeg" 
           class="transition hover:scale-110">
    </div>

  </div>


</body>
</html>
