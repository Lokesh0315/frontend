<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Course Cards</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card {
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container py-5 row g-4">

        <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
            <div class="card course-card h-100 shadow">
                <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Web Development</h5>
                    <p>Trainer: John</p>
                    <h6>₹2999</h6>
                    <button class="btn btn-primary w-100">Enroll</button>
                </div>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
            <div class="card course-card h-100 shadow">
                <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Python</h5>
                    <p>Trainer: David</p>
                    <h6>₹2499</h6>
                    <button class="btn btn-success w-100">Enroll</button>
                </div>
            </div>
        </div>

        <!-- Card 3 -->
        <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
            <div class="card course-card h-100 shadow">
                <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Java</h5>
                    <p>Trainer: Smith</p>
                    <h6>₹1999</h6>
                    <button class="btn btn-danger w-100">Enroll</button>
                </div>
            </div>
        </div>

        <!-- Card 4 -->
        <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
            <div class="card course-card h-100 shadow">
                <img src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">UI/UX Design</h5>
                    <p>Trainer: Alex</p>
                    <h6>₹3999</h6>
                    <button class="btn btn-warning w-100">Enroll</button>
                </div>
            </div>
        </div>

        <!-- Card 5 -->
        <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
            <div class="card course-card h-100 shadow">
                <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">React JS</h5>
                    <p>Trainer: Kevin</p>
                    <h6>₹3499</h6>
                    <button class="btn btn-info w-100">Enroll</button>
                </div>
            </div>
        </div>

        <!-- Card 6 -->
        <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
            <div class="card course-card h-100 shadow">
                <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Data Science</h5>
                    <p>Trainer: Robert</p>
                    <h6>₹4999</h6>
                    <button class="btn btn-dark w-100">Enroll</button>
                </div>
            </div>
        </div>




    </div>
</body>

</html>
