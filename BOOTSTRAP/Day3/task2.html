<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container-fluid">

        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 sidebar p-3">

                <h3 class="text-center mb-4">Admin</h3>

                <a href="#">Dashboard</a>
                <a href="#">Users</a>
                <a href="#">Courses</a>
                <a href="#">Reports</a>
                <a href="#">Settings</a>

            </div>

            <!-- Main Content -->
            <div class="col-md-9 col-lg-10 p-4">

                <h2 class="mb-4">Dashboard</h2>

                <!-- Statistics Cards -->
                <div class="row g-4 mb-5">

                    <div class="col-md-6 col-lg-3">
                        <div class="card stat-card shadow p-3">
                            <h5>Total Users</h5>
                            <h2>1200</h2>
                        </div>
                    </div>

                    <div class="col-md-6 col-lg-3">
                        <div class="card stat-card shadow p-3">
                            <h5>Courses</h5>
                            <h2>45</h2>
                        </div>
                    </div>

                    <div class="col-md-6 col-lg-3">
                        <div class="card stat-card shadow p-3">
                            <h5>Revenue</h5>
                            <h2>₹50K</h2>
                        </div>
                    </div>

                    <div class="col-md-6 col-lg-3">
                        <div class="card stat-card shadow p-3">
                            <h5>Reports</h5>
                            <h2>15</h2>
                        </div>
                    </div>

                </div>

                <!-- Table -->
                <div class="card shadow p-4">

                    <h4 class="mb-3">Recent Users</h4>

                    <div class="table-responsive">

                        <table class="table table-bordered table-hover">

                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Status</th>
                                </tr>
                            </thead>

                            <tbody>

                                <tr>
                                    <td>1</td>
                                    <td>Lokesh</td>
                                    <td>lokesh@gmail.com</td>
                                    <td>Active</td>
                                </tr>

                                <tr>
                                    <td>2</td>
                                    <td>John</td>
                                    <td>john@gmail.com</td>
                                    <td>Active</td>
                                </tr>

                                <tr>
                                    <td>3</td>
                                    <td>David</td>
                                    <td>david@gmail.com</td>
                                    <td>Inactive</td>
                                </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
