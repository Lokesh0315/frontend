<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>thumbnail</title>
    <link rel="stylesheet" href="../assests/thumbnail.css">
</head>

<body>
    <div class="parent">
        <div style="background-color: white;">
            <div class="parent-one">
                <p>Thumbnail</p>
            </div>
            <div class="child-one">
                <div>
                    <img src="../assests/Images/Myntra/19.jpeg" alt="">
                </div>

                <div>
                    <p><span style="font-weight: bold;">Note:</span> This image tile will be used to represent this
                        course across all your academy's landing pages.
                        <br>Allowed formats: ".jpg, .png, .jpeg, .gif, .webp, .sketch"
                        <br>Preferred minimum resolution: 480*270
                        <br>Maximum size: 150kb
                    </p>
                    <div>
                        <button class="change">change Image</button>
                        <button class="remove">Remove Image</button>
                    </div>

                </div>
            </div>
        </div>
    </div>
</body>

</html>
