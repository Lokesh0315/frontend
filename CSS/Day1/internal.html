<html>

<head>

    <style>
        h1 {
            background-color: green;
            color: black;
        }

        p {
            background-color: green;
            color: black;
        }

        div {
            background-color: green;
            color: black;
        }

        span {
            background-color: green;
            color: black;

</html>
