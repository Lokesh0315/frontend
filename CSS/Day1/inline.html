<html>

<head>
    <title>Inline CSS</title>
</head>

<body>
    <h1 style="background-color: yellow; color: black;">This is first tag</h1>
    <p style="background-color: yellow; color: black;">This is a second tag.</p>
    <div style="background-color: yellow; color: black;">This is a third tag.</div>
    <br>
    <span style="background-color: yellow; color: black;">This is a fourth tag.</span>
    <br>
    <h3 style="background-color: yellow; color: black;">This is a fifth tag.</h3>
</body>

</html>
