<html>

<head>
    <title>Inline CSS</title>
</head>

<body>
    <div style="background-color: yellow;">
        <h1 style="color: black;">This is first tag</h1>
    </div>
    <div style="background-color: rgb(111, 0, 255);">
        <p style="color: black;">This is a second tag.</p>
    </div>
    <div style="background-color: rgb(255, 0, 85);">
        <p style="color: black;">This is a third tag.</p>
    </div>
    <div style="background-color: rgb(45, 193, 204);">
        <h2 style="color: black;">This is a fourth tag.</h2>
    </div>
    <div style="background-color: rgb(255, 102, 0);">
        <h3 style="color: black;">This is a fifth tag.</h3>
    </div>
</body>

</html>
