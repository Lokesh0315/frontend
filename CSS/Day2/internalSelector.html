<html>

<head>
    <title>Internal Selector CSS</title>
    <style>
        .firstTag {
            background-color: rgb(255, 0, 85);
        }

        #second {
            background-color: rgb(45, 193, 204);
        }

        h2 h3 {
            background-color: rgb(255, 102, 0);
        }

        div p {
            background-color: rgb(68, 0, 255);
        }
    </style>
</head>

<body>
    <h1 class="firstTag">This is first tag</h1>
    <p class="secondTag" id="second">This is a second tag.</p>
    <div>
        <p>This is a third tag.</p>
    </div>
    <h2>This is a fourth tag.</h2>
    <h3>This is a fifth tag.</h3>
</body>

</html>
