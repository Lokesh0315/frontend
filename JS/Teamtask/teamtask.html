<script>

function score(mark){
if(mark >= 90 && mark <= 100){
console.log("Grade A");
}
else if(mark >= 80){
    console.log("Grade B");
}
else if(mark >= 70){
    console.log("Grade C");
}
else if(mark >= 60){
    console.log("Grade D");
}
else{
    console.log("Fail");
}
}
score(90)


function number(num){

if(num % 2 === 0){
    console.log("Even");
}
else{
    console.log("Odd");
}
}
number(20)


function array(...marks){
let total = 0;

for(let i=0;i<marks.length;i++){
    total += marks[i];
}

let average = total / marks.length;

console.log("Total Marks:", total);
console.log("Average:", average);
}
array(100,200,50,250)



function Highest_Collection(...collections){

let highest = collections[0];
let index = 0;

for(let i=1;i<collections.length;i++){

    if(collections[i] > highest){
        highest = collections[i];
        index = i;
    }

}
console.log("Highest Collection:", highest);
console.log("Movie Index:", index);
}
Highest_Collection(100,250,400,300,250,500,800,340)
